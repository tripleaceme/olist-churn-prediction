version: 2

models:
  - name: int_customer_rfm
    description: "Recency, Frequency, Monetary (RFM) features and quintile scores per customer. Classic customer segmentation framework."
    columns:
      - name: customer_unique_id
        description: "True unique customer identifier."
        tests:
          - unique
          - not_null
      - name: recency_days
        description: "Number of days between the customer's last order and the dataset end date. Lower = more recent."
      - name: frequency
        description: "Total number of delivered orders (same as total_orders)."
      - name: monetary
        description: "Total lifetime revenue in BRL (same as lifetime_revenue)."
      - name: recency_score
        description: "Recency quintile (1-5). 5 = most recent, 1 = least recent."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: frequency_score
        description: "Frequency quintile (1-5). 5 = most frequent, 1 = least frequent."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: monetary_score
        description: "Monetary quintile (1-5). 5 = highest spend, 1 = lowest spend."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: rfm_combined_score
        description: "Sum of recency + frequency + monetary scores (3-15). Higher = more valuable customer."
