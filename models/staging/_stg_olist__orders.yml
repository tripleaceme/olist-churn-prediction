version: 2

models:
  - name: stg_olist__orders
    description: "Cleaned orders with standardized timestamps. One row per order."
    meta:
      label: "Staging Orders"
      group_label: "Staging"
    columns:
      - name: order_id
        description: "Unique order identifier."
        meta:
          dimension:
            type: string
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_olist__customers. Order-level customer identifier."
        meta:
          dimension:
            type: string
        tests:
          - not_null
          - relationships:
              to: ref('stg_olist__customers')
              field: customer_id
      - name: order_status
        description: "Current order status. One of: delivered, shipped, canceled, unavailable, invoiced, processing, created, approved."
        meta:
          dimension:
            type: string
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'unavailable',
                       'invoiced', 'processing', 'created', 'approved']
      - name: purchased_at
        description: "Timestamp when the customer placed the order."
        meta:
          dimension:
            type: timestamp
      - name: approved_at
        description: "Timestamp when the payment was approved."
        meta:
          dimension:
            type: timestamp
      - name: shipped_at
        description: "Timestamp when the order was handed to the logistics carrier."
        meta:
          dimension:
            type: timestamp
      - name: delivered_at
        description: "Timestamp when the order was delivered to the customer."
        meta:
          dimension:
            type: timestamp
      - name: estimated_delivery_at
        description: "Estimated delivery date shown to the customer at purchase time."
        meta:
          dimension:
            type: timestamp
