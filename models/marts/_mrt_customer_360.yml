version: 2

models:
  - name: mrt_customer_360
    description: "Wide feature table per customer combining order summary, RFM, behavioral features, and churn label. This is the ML-ready input table."
    columns:
      - name: customer_unique_id
        description: "True unique customer identifier. Primary key."
        tests:
          - unique
          - not_null
      - name: state
        description: "Customer state abbreviation (e.g., SP, RJ, MG)."
      - name: total_orders
        description: "Total number of delivered orders placed by this customer."
      - name: lifetime_revenue
        description: "Total payment value across all orders in BRL."
      - name: avg_order_value
        description: "Average payment value per order in BRL."
      - name: total_items_purchased
        description: "Total number of line items purchased across all orders."
      - name: avg_delivery_days
        description: "Average number of days from purchase to delivery."
      - name: avg_delivery_delta_days
        description: "Average delivery delta (actual vs estimated). Negative = typically late."
      - name: avg_review_score
        description: "Average review score across all orders (1-5 scale)."
      - name: worst_review_score
        description: "Lowest review score the customer ever gave."
      - name: avg_installments
        description: "Average maximum installment count across orders."
      - name: late_delivery_count
        description: "Number of orders delivered after the estimated date."
      - name: customer_tenure_days
        description: "Number of days between first and last order. 0 for single-order customers."
      - name: recency_days
        description: "Days since last order relative to dataset end date."
      - name: frequency
        description: "Total delivered order count (RFM frequency)."
      - name: monetary
        description: "Total lifetime revenue in BRL (RFM monetary)."
      - name: recency_score
        description: "Recency quintile (1-5). 5 = most recent."
      - name: frequency_score
        description: "Frequency quintile (1-5). 5 = most frequent."
      - name: monetary_score
        description: "Monetary quintile (1-5). 5 = highest spend."
      - name: rfm_combined_score
        description: "Sum of recency + frequency + monetary scores (3-15)."
      - name: unique_categories_purchased
        description: "Number of distinct product categories bought."
      - name: unique_products_purchased
        description: "Number of distinct products bought."
      - name: unique_payment_methods
        description: "Number of distinct payment types used."
      - name: credit_card_usage_ratio
        description: "Proportion of payments made by credit card (0.0-1.0)."
      - name: boleto_usage_ratio
        description: "Proportion of payments made by boleto (0.0-1.0)."
      - name: days_since_last_order
        description: "Days between last order and dataset end date."
      - name: churned
        description: "Binary churn label. 1 = single-order customer (churned), 0 = repeat buyer (retained)."
        tests:
          - not_null
          - accepted_values:
              values: [0, 1]
