name: 'olist_churn'
version: '1.0.0'
config-version: 2

profile: 'olist_churn'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  olist_churn:
    +schema: raw_data
    product_category_name_translation:
      +column_types:
        product_category_name: varchar(100)
        product_category_name_english: varchar(100)

models:
  olist_churn:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
